# Server Configuration
server.port=8080

# Database Configuration
# --- Option A: H2 In-Memory (default, no external DB required) ---
spring.datasource.url=jdbc:h2:mem:jevis4
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA: H2 creates schema from JPA entities; Flyway is disabled for H2
spring.jpa.hibernate.ddl-auto=create
spring.flyway.enabled=false

# --- Option B: PostgreSQL with Flyway (comment out Option A above, uncomment below) ---
#spring.datasource.url=jdbc:postgresql://localhost:5432/jevis4
#spring.datasource.username=jevis
#spring.datasource.password=jevis2025
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=validate
#spring.flyway.enabled=true
#spring.flyway.baseline-on-migrate=true
#spring.h2.console.enabled=false

# Enable _method override so htmx can simulate PUT/DELETE via POST forms
spring.mvc.hiddenmethod.filter.enabled=true

# JPA Configuration
spring.jpa.show-sql=false
# Data initialization is handled by DataInitializer.java
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=false
# Suppress SQL logging for cleaner startup output
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=WARN

# JTE Template Engine Configuration
gg.jte.developmentMode=true

# SpringDoc OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.paths-to-match=/dashboard/api/**,/monitoring/api/**,/sensors/**,/csr/**,/api/workers/**

# Quartz Configuration
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# Job System Configuration
jevis.jobs.heartbeat-timeout-minutes=5
jevis.jobs.timeout-check-interval-seconds=30
jevis.jobs.retry-check-interval-seconds=60
