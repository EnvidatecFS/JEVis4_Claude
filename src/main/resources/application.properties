# Server Configuration
server.port=8080

# Database Configuration
# Uncomment for PostgreSQL (requires PostgreSQL running on localhost:5432)
#spring.datasource.url=jdbc:postgresql://localhost:5432/jevis4
#spring.datasource.username=postgres
#spring.datasource.password=jevispw
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 In-Memory Database (for development without PostgreSQL)
spring.datasource.url=jdbc:h2:mem:jevis4
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
# Data initialization is handled by DataInitializer.java
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=false
# Suppress SQL logging for cleaner startup output
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=WARN

# JTE Template Engine Configuration
gg.jte.developmentMode=true

# SpringDoc OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.paths-to-match=/dashboard/api/**,/monitoring/api/**,/sensors/**,/csr/**,/api/workers/**

# Quartz Configuration
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# Job System Configuration
jevis.jobs.heartbeat-timeout-minutes=5
jevis.jobs.timeout-check-interval-seconds=30
jevis.jobs.retry-check-interval-seconds=60
