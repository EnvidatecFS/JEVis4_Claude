# Test Configuration - H2 In-Memory Database
# Schema is created fresh for each test run by Hibernate; Flyway is not used in tests.

spring.datasource.url=jdbc:h2:mem:jevis4test;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Disable Flyway for tests
spring.flyway.enabled=false

# Suppress H2/Hibernate noise in test output
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.jdbc.datasource.init.ScriptUtils=WARN

# Quartz: use in-memory store for tests (no JDBC tables needed)
spring.quartz.job-store-type=memory

# JTE
gg.jte.developmentMode=true
